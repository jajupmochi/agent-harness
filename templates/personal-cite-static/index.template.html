<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="meta.title"><SITE_NAME></title>
  <meta name="description" content="<DESCRIPTION>" data-i18n-attr="content" data-i18n="meta.description">
  <link rel="canonical" href="<DEPLOY_URL>/index.html">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header>
    <h1 data-i18n="hero.title"><SITE_NAME></h1>
    <p data-i18n="hero.subtitle"><DESCRIPTION></p>
    <nav>
      <button data-lang="en">EN</button>
      <button data-lang="zh">中文</button>
    </nav>
  </header>

  <main>
    <section id="about">
      <h2 data-i18n="about.heading">About</h2>
      <p data-i18n="about.body">Replace this with your bio.</p>
    </section>

    <section id="projects">
      <h2 data-i18n="projects.heading">Projects</h2>
      <ul id="projects-list"></ul>
    </section>

    <section id="publications">
      <h2 data-i18n="publications.heading">Publications</h2>
      <ul id="publications-list"></ul>
    </section>

    <section id="contact">
      <h2 data-i18n="contact.heading">Contact</h2>
      <p data-i18n="contact.body">Your contact info here.</p>
    </section>
  </main>

  <footer>
    <p data-i18n="footer.copyright">&copy; <AUTHOR_NAME>. <span data-i18n="footer.tagline">Built with care.</span></p>
  </footer>

  <script>
    // Minimal i18n loader — replace with your full implementation as needed.
    async function loadLocale(lang) {
      try {
        const res = await fetch(`locales/${lang}.json`);
        if (!res.ok) throw new Error(`Failed to load locale: ${lang}`);
        const dict = await res.json();
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          const value = key.split('.').reduce((o, k) => o?.[k], dict);
          if (value) el.textContent = value;
        });
        document.documentElement.lang = lang;
        localStorage.setItem('lang', lang);
      } catch (err) {
        console.warn('i18n load failed:', err);
      }
    }

    document.querySelectorAll('[data-lang]').forEach(btn => {
      btn.addEventListener('click', () => loadLocale(btn.dataset.lang));
    });

    // Load saved lang or default to browser preference
    const initialLang = localStorage.getItem('lang')
      || (navigator.language.startsWith('zh') ? 'zh' : 'en');
    loadLocale(initialLang);
  </script>
</body>
</html>
