# Template pyproject.toml for a Python research package using uv + ruff.
# Includes research-specific [project.optional-dependencies] extras (torch, data, logging).
# Replace <PLACEHOLDERS> with project-specific values.

[project]
name = "<PROJECT_NAME>"
version = "0.1.0"
description = "<DESCRIPTION>"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "<AUTHOR_NAME>", email = "<AUTHOR_EMAIL>" },
]
keywords = ["<keyword-1>", "<keyword-2>"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

# Core dependencies — keep this minimal (numpy + yaml is enough for many research packages)
dependencies = [
  "numpy>=1.26",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
# Dev tools — install with `uv pip install -e ".[dev]"`
dev = [
  "ruff>=0.5",
  "mypy>=1.10",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pre-commit>=3.7",
]

# PyTorch + ML — install with `uv pip install -e ".[torch]"`
torch = [
  "torch>=2.3",
  "torchvision",
]

# Data handling — install with `uv pip install -e ".[data]"`
data = [
  "pandas>=2.2",
  "polars>=0.20",
  "pyarrow>=15.0",
]

# Experiment logging — install with `uv pip install -e ".[logging]"`
logging = [
  "wandb",
  "mlflow",
]

# Everything for full research workflow:
all = ["<PROJECT_NAME>[dev,torch,data,logging]"]

[project.scripts]
<PROJECT_NAME> = "<PACKAGE_NAME>.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ─────────────────────────────────────────────────────────────────────────────
# ruff: linter + formatter
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 88
target-version = "py312"
src = ["<PACKAGE_NAME>", "tests"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
select = [
  "E", "W",  # pycodestyle
  "F",       # pyflakes
  "I",       # isort
  "B",       # flake8-bugbear
  "C4",      # flake8-comprehensions
  "UP",      # pyupgrade
  "SIM",     # flake8-simplify
]
ignore = ["E501"]  # line-too-long handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["<PACKAGE_NAME>"]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]
"experiments/**" = ["E402"]

# ─────────────────────────────────────────────────────────────────────────────
# mypy
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
exclude = ["build/", "dist/", "experiments/"]

# ─────────────────────────────────────────────────────────────────────────────
# pytest
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
addopts = "-q --cov=<PACKAGE_NAME> --cov-report=term-missing"
testpaths = ["tests"]
markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
  "download: marks tests requiring network (deselect with '-m \"not download\"')",
]

[tool.coverage.run]
source = ["<PACKAGE_NAME>"]
omit = ["*/tests/*", "*/experiments/*"]
