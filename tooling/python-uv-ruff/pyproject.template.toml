# Template pyproject.toml for a Python research package using uv + ruff.
# Replace <PLACEHOLDERS> with project-specific values.

[project]
name = "<package-name>"
version = "0.1.0"
description = "<one-line description>"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "<Your Name>", email = "<your-email>" },
]
keywords = ["<keyword-1>", "<keyword-2>"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

# Core dependencies — keep this minimal. Heavier deps go into [project.optional-dependencies].
dependencies = [
  "numpy",
  "pyyaml",
]

[project.optional-dependencies]
# Dev tools — install with `uv pip install -e ".[dev]"`
dev = [
  "ruff",
  "mypy",
  "pytest",
  "pytest-cov",
  "pre-commit",
]
# Add domain-specific extras as needed:
# torch = ["torch>=2.0", "torchvision"]
# data = ["pandas", "polars"]
# logging = ["wandb", "mlflow"]
# all = [project[dev,torch,data,logging]]

[project.scripts]
<package-name> = "<package_name>.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ─────────────────────────────────────────────────────────────────────────────
# ruff: linter + formatter (canonical replacement for black + flake8 + isort)
# ─────────────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 88
target-version = "py312"
src = ["<package_name>", "tests"]

[tool.ruff.format]
quote-style = "single"   # author convention; switch to "double" if preferred
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
# Enable a strong default set; relax per file if needed
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "SIM", # flake8-simplify
]
ignore = [
  "E501",  # line too long (formatter handles)
]

[tool.ruff.lint.isort]
known-first-party = ["<package_name>"]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]    # asserts in tests are fine
"experiments/**" = ["E402"]  # late imports in notebooks-as-scripts are fine

# ─────────────────────────────────────────────────────────────────────────────
# mypy: strict typing (drop if not using mypy)
# ─────────────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
exclude = ["build/", "dist/", "experiments/"]

# ─────────────────────────────────────────────────────────────────────────────
# pytest
# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
addopts = "-q --cov=<package_name> --cov-report=term-missing"
testpaths = ["tests"]
markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
  "download: marks tests that require network (deselect with '-m \"not download\"')",
]

[tool.coverage.run]
source = ["<package_name>"]
omit = ["*/tests/*", "*/experiments/*"]
